<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Main background gradient: deep indigo → violet → fuchsia -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="35%" style="stop-color:#3d1278"/>
      <stop offset="70%" style="stop-color:#7b2fff"/>
      <stop offset="100%" style="stop-color:#c44dff"/>
    </linearGradient>

    <!-- Glow radial gradient for the center bloom -->
    <radialGradient id="glowBloom" cx="50%" cy="52%" r="48%">
      <stop offset="0%" style="stop-color:#b06aff;stop-opacity:0.55"/>
      <stop offset="100%" style="stop-color:#1a0533;stop-opacity:0"/>
    </radialGradient>

    <!-- Subtle top-left light -->
    <radialGradient id="topLight" cx="20%" cy="18%" r="40%">
      <stop offset="0%" style="stop-color:#e8c0ff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#1a0533;stop-opacity:0"/>
    </radialGradient>

    <!-- Note fill gradient -->
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="60%" style="stop-color:#e8d0ff"/>
      <stop offset="100%" style="stop-color:#c89fff"/>
    </linearGradient>

    <!-- Note inner glow filter -->
    <filter id="noteGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft drop shadow for note -->
    <filter id="noteShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="28" flood-color="#9b3fff" flood-opacity="0.7"/>
    </filter>

    <!-- Rounded rect clip for icon shape -->
    <clipPath id="roundedClip">
      <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedClip)">
    <!-- Background fill -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Bloom overlays -->
    <rect width="1024" height="1024" fill="url(#glowBloom)"/>
    <rect width="1024" height="1024" fill="url(#topLight)"/>

    <!-- Decorative ring — faint outer circle -->
    <circle cx="512" cy="512" r="370" fill="none" stroke="#c89fff" stroke-width="1.5" stroke-opacity="0.12"/>
    <circle cx="512" cy="512" r="310" fill="none" stroke="#c89fff" stroke-width="1" stroke-opacity="0.08"/>

    <!-- Sparkle dots -->
    <circle cx="310" cy="295" r="5" fill="#e8d0ff" fill-opacity="0.55"/>
    <circle cx="718" cy="260" r="3.5" fill="#ffffff" fill-opacity="0.4"/>
    <circle cx="760" cy="690" r="4.5" fill="#d4a0ff" fill-opacity="0.45"/>
    <circle cx="270" cy="730" r="3" fill="#ffffff" fill-opacity="0.3"/>
    <circle cx="820" cy="430" r="2.5" fill="#e8d0ff" fill-opacity="0.35"/>
    <circle cx="195" cy="510" r="2" fill="#ffffff" fill-opacity="0.25"/>

    <!-- ===== MUSIC NOTE ===== -->
    <!-- The note is centered around x=512, vertically ~480 -->
    <!-- Glow halo behind note -->
    <g filter="url(#noteShadow)">
      <!-- Note head (filled oval, slightly tilted) -->
      <ellipse cx="432" cy="618" rx="75" ry="58" transform="rotate(-18 432 618)" fill="url(#noteGrad)"/>

      <!-- Stem (vertical bar up from note head right edge) -->
      <rect x="497" y="262" width="46" height="376" rx="23" fill="url(#noteGrad)"/>

      <!-- Flag 1 (top beam curving right) -->
      <path d="M543 262 C680 310 710 400 580 430" stroke="url(#noteGrad)" stroke-width="44" stroke-linecap="round" fill="none"/>

      <!-- Flag 2 (second beam below first) -->
      <path d="M543 350 C660 395 690 475 575 510" stroke="url(#noteGrad)" stroke-width="40" stroke-linecap="round" fill="none"/>
    </g>

    <!-- Subtle inner sheen on note head -->
    <ellipse cx="418" cy="604" rx="30" ry="20" transform="rotate(-18 418 604)" fill="white" fill-opacity="0.22"/>
  </g>
</svg>
