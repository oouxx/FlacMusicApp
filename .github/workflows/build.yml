name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DEVELOPER_DIR: /Applications/Xcode_15.0.app/Contents/Developer

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-14
    strategy:
      matrix:
        arch: [arm64, x86_64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.0.app/Contents/Developer

      - name: Build macOS (${{ matrix.arch }})
        run: |
          xcodebuild build \
            -project FlacMusicApp.xcodeproj \
            -target FlacMusicApp-macOS \
            -sdk macosx \
            -arch ${{ matrix.arch }} \
            -configuration Release \
            -derivedDataPath DerivedData

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macOS-${{ matrix.arch }}-build
          path: |
            DerivedData/Build/Products/Release/*.app
            DerivedData/Build/Products/Release/*.dylib
          retention-days: 1

  build-ios:
    name: Build iOS (Simulator)
    runs-on: macos-14
    strategy:
      matrix:
        destination: ['platform=iOS Simulator,name=iPhone 15 Pro,OS=17.0']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.0.app/Contents/Developer

      - name: Build iOS Simulator
        run: |
          xcodebuild build \
            -project FlacMusicApp.xcodeproj \
            -target FlacMusicApp-iOS \
            -sdk iphonesimulator \
            -arch arm64 \
            -configuration Release \
            -derivedDataPath DerivedData \
            -destination '${{ matrix.destination }}' \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: |
            DerivedData/Build/Products/Release-iphonesimulator/*.app
          retention-days: 1
