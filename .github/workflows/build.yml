name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DEVELOPER_DIR: /Applications/Xcode_15.2.app/Contents/Developer

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

      - name: Build macOS
        run: make build-macos

      - name: Archive & Export macOS
        run: make export-macos

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macOS-app
          path: .build/export/macos/*.app
          retention-days: 7

  build-ios:
    name: Build iOS (Simulator)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

      - name: Build iOS Simulator
        run: make build-ios-sim

      - name: Archive & Export iOS
        run: make export-ios

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: .build/export/ios/*.ipa
          retention-days: 7
